sonar.projectKey=calcom-upa-testing
sonar.host.url=http://localhost:9000
# sonar.token NO debe ir aquí en texto plano. Pasar por variable de entorno:
#   PowerShell:  $env:SONAR_TOKEN="tu_token_nuevo"; npx @sonar/scan
#   cmd.exe:     set SONAR_TOKEN=tu_token_nuevo && npx @sonar/scan
# El scanner de sonar lee SONAR_TOKEN automáticamente.

# Solo módulos representativos de cal.com + tu proyecto de pruebas
sonar.sources=packages/lib,packages/features,tests
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/__mocks__/**,**/*.generated.*,**/.turbo/**

# Tests
sonar.tests=tests
sonar.test.inclusions=**/test_*.py

# Cobertura Python (requisito de la Parte B)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11

sonar.sourceEncoding=UTF-8
sonar.javascript.node.maxspace=6144
sonar.typescript.tsconfigPaths=tsconfig.sonar.json